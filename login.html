<!DOCTYPE html>
<html>
<head>
<title>CourseHub Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Segoe UI;
background:
linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url("https://images.unsplash.com/photo-1513258496099-48168024aec0?w=1920");
background-size:cover;
background-position:center;
}

.box{
width:360px;
background:white;
padding:35px;
border-radius:14px;
text-align:center;
box-shadow:0 8px 25px rgba(0,0,0,.4);
}

.switch{
display:flex;
background:#eee;
border-radius:8px;
overflow:hidden;
margin:20px 0;
}

.switch button{
flex:1;
padding:10px;
border:none;
cursor:pointer;
background:transparent;
font-weight:600;
}

.active{
background:#1976d2;
color:white;
}

input{
width:100%;
padding:11px;
margin:8px 0;
border:1px solid #ccc;
border-radius:7px;
box-sizing:border-box;
}

.loginBtn{
width:100%;
padding:11px;
margin-top:10px;
background:#1976d2;
color:white;
border:none;
border-radius:7px;
cursor:pointer;
font-size:15px;
}

#msg{
color:red;
margin-top:10px;
}
</style>
</head>

<body>

<div class="box">

<h2>CourseHub</h2>
<p>Learning Portal</p>

<div class="switch">
<button id="studentBtn" class="active" type="button" onclick="setRole('student')">Student</button>
<button id="adminBtn" type="button" onclick="setRole('admin')">Admin</button>
</div>

<input id="name" placeholder="Enter Name">
<input id="email" placeholder="Enter Email">
<input id="password" type="password" placeholder="Enter Password">

<button class="loginBtn" type="button" onclick="login()">Login</button>

<p id="msg"></p>

</div>

<script>

let role = "student";

function setRole(selectedRole){

role = selectedRole;

document.getElementById("studentBtn").classList.remove("active");
document.getElementById("adminBtn").classList.remove("active");

if(role === "student"){
document.getElementById("studentBtn").classList.add("active");
}else{
document.getElementById("adminBtn").classList.add("active");
}

}

async function login(){

const nameInput = document.getElementById("name").value.trim();
const emailInput = document.getElementById("email").value.trim();
const passwordInput = document.getElementById("password").value.trim();
const msg = document.getElementById("msg");

msg.innerText = "";

if(!nameInput || !emailInput || !passwordInput){
msg.innerText = "Please fill all fields";
return;
}

try{

const response = await fetch("http://127.0.0.1:3000/api/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
name:nameInput,
email:emailInput,
password:passwordInput,
role:role
})
});

const data = await response.json();

if(data.success){

localStorage.setItem("userEmail", emailInput);
localStorage.setItem("userRole", role);

if(role === "admin"){
window.location.href = "admin.html";
}else{
window.location.href = "student.html";
}

}else{
msg.innerText = data.message || "Login failed";
}

}catch(error){

console.log(error);
msg.innerText = "Server not connected";

}

}

</script>

</body>
</html>
